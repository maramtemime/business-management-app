<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
        if (localStorage.getItem("sidebarHidden") === "true") {
            document.documentElement.classList.add("preload-sidebar-hidden");
        }
    </script>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
</head>

<body class="dashboard-body">
    <script>
        if (localStorage.getItem("sidebarHidden") === "true") {
            document.body.classList.add("sidebar-hidden");
        }
    </script>

    <button class="floating-menu-btn" onclick="toggleSidebar()" title="Afficher le menu">
        <i class="bi bi-list"></i>
    </button>

    <div class="sidebar" id="sidebar">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h2>Tableau de bord</h2>
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Masquer le menu">
                <i class="bi bi-layout-sidebar-inset"></i>
            </button>
        </div>
        <div class="nav-item">
            <a href="{{ url_for('dashboard') }}" class="text-decoration-none text-white d-flex align-items-center w-100">
                <i class="bi bi-list-task me-2"></i> Tâches
            </a>
        </div>
        <div class="nav-item"><i class="bi bi-people me-2"></i> Travailleurs</div>
        <div class="nav-item">
            <a href="{{ url_for('archive') }}" class="text-decoration-none text-white d-flex align-items-center w-100">
                <i class="bi bi-archive me-2"></i> Archives
            </a>
        </div>
        <div class="nav-item"><i class="bi bi-graph-up me-2"></i> Statistiques</div>
    </div>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const isHidden = localStorage.getItem("sidebarHidden");
            if (isHidden === "true") {
                document.body.classList.add("sidebar-hidden");
            }
        });

        function toggleSidebar() {
            if (!document.body) return;
            document.body.classList.toggle("sidebar-hidden");
            const isHidden = document.body.classList.contains("sidebar-hidden");
            localStorage.setItem("sidebarHidden", isHidden ? "true" : "false");
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
